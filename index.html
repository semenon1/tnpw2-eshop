<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <title>E-shop – TNPW2</title>
    
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    
    <style>
      .notification {
        animation: fadeOut 3s forwards;
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 20px;
        border-radius: 4px;
        color: white;
        z-index: 1000;
      }
      .warning {
        background-color: darkorange;
        color: #fff;
      }
      .success {
        background-color: green;
        color: #000;
      }

      @keyframes fadeOut {
        0% { opacity: 1; }
        70% { opacity: 1; }
        100% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <main id="app" class="container"></main>

    <script type="module" src="/tnpw2-eshop/src/app/init.js"></script>
  </body>
</html>
